name: Update local repository

on:
  push:

concurrency:
  group: update-local-repo-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-local-repo:
    # on.push.branches nao aceita variavel, entao filtramos aqui:
    # so roda quando o push for na branch definida em SOURCE_BRANCH (fallback main).
    if: ${{ github.ref_name == (vars.SOURCE_BRANCH || 'main') }}
    runs-on:
      - self-hosted
      - windows
    # Evita que o job fique pendurado para sempre se o git abrir prompt de credencial.
    timeout-minutes: 5
    env:
      LOCAL_REPO_PATH: ${{ vars.LOCAL_REPO_PATH }}
      SOURCE_BRANCH: ${{ vars.SOURCE_BRANCH || 'main' }}
      TARGET_BRANCH: ${{ vars.TARGET_BRANCH || 'main' }}
      # Token do proprio workflow, usado para autenticar o fetch/pull do repo privado.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Faz o git FALHAR rapido em vez de travar esperando login interativo.
      GIT_TERMINAL_PROMPT: "0"
      GCM_INTERACTIVE: "never"
    steps:
      - name: Validate configuration
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LOCAL_REPO_PATH)) {
            throw "Defina a variável de repositório LOCAL_REPO_PATH com o caminho absoluto do clone local."
          }

          if (-not (Test-Path -LiteralPath $env:LOCAL_REPO_PATH)) {
            throw "LOCAL_REPO_PATH não existe: $env:LOCAL_REPO_PATH"
          }

          $gitDir = Join-Path $env:LOCAL_REPO_PATH ".git"
          if (-not (Test-Path -LiteralPath $gitDir)) {
            throw "O caminho informado não parece ser um repositório Git: $env:LOCAL_REPO_PATH"
          }

      - name: Update local clone
        shell: powershell
        run: |
          # O runner roda como NETWORK SERVICE, mas a pasta pertence ao Administrators.
          # Marca o diretorio como confiavel (idempotente) para evitar "dubious ownership".
          $repo = $env:LOCAL_REPO_PATH -replace '\\', '/'
          $safe = git config --global --get-all safe.directory
          if ($safe -notcontains $repo) {
            git config --global --add safe.directory "$repo"
          }

          # Autentica o fetch/pull do repo privado usando o GITHUB_TOKEN via header,
          # sem gravar o token no .git/config do clone local.
          $basic = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("x-access-token:$($env:GH_TOKEN)"))
          $authHeader = "http.https://github.com/.extraheader=AUTHORIZATION: basic $basic"

          git -C "$env:LOCAL_REPO_PATH" -c "$authHeader" fetch origin "$env:TARGET_BRANCH"
          git -C "$env:LOCAL_REPO_PATH" checkout "$env:TARGET_BRANCH"
          git -C "$env:LOCAL_REPO_PATH" -c "$authHeader" pull --ff-only origin "$env:TARGET_BRANCH"